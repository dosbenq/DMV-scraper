<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NC DMV Monitor</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <div class="logo-icon"></div>
                <h1>NC <span class="accent">DMV</span> Monitor</h1>
            </div>
            <div class="status-badge" id="monitor-status">Idle</div>
        </header>

        <main>
            <section class="quick-stats">
              <div class="stat-card">
                <span class="stat-label">Last Run</span>
                <span class="stat-value" id="last-run-time">Never</span>
              </div>
              <div class="stat-card">
                <span class="stat-label">Slots Found</span>
                <span class="stat-value" id="slots-found-count">0</span>
              </div>
            </section>

            <section class="config-tabs">
                <div class="tabs-header">
                    <button class="tab-btn active" data-tab="location">Location</button>
                    <button class="tab-btn" data-tab="preferences">Dates</button>
                    <button class="tab-btn" data-tab="group">Group</button>
                </div>

                <div class="tab-content active" id="tab-location">
                    <div class="input-group">
                        <label>Search Location</label>
                        <div class="location-toggle-group">
                            <input type="text" id="zip-code" placeholder="Enter Zip Code" maxlength="5">
                            <span class="or-divider">OR</span>
                            <button id="use-location" class="location-btn" title="Use My Current Location">
                                📍 <span class="btn-text">Use GPS</span>
                            </button>
                        </div>
                        <div id="location-display" class="location-status"></div>
                    </div>
                    <div class="input-group">
                        <label for="radius">Radius (miles)</label>
                        <input type="number" id="radius" value="50" min="5" max="200">
                    </div>
                </div>

                <div class="tab-content" id="tab-preferences">
                    <div class="row">
                        <div class="input-group">
                            <label for="date-from">From</label>
                            <input type="date" id="date-from">
                        </div>
                        <div class="input-group">
                            <label for="date-to">To</label>
                            <input type="date" id="date-to">
                        </div>
                    </div>
                    <div class="input-group">
                      <label for="poll-interval">Poll Interval</label>
                      <select id="poll-interval">
                          <option value="5">Every 5 minutes</option>
                          <option value="10" selected>Every 10 minutes</option>
                          <option value="15">Every 15 minutes</option>
                          <option value="30">Every 30 minutes</option>
                          <option value="60">Every hour</option>
                      </select>
                    </div>
                </div>

                <div class="tab-content" id="tab-group">
                    <div class="toggle-group">
                        <label for="group-enabled">Enable Group Booking</label>
                        <input type="checkbox" id="group-enabled" checked>
                    </div>
                    <div class="input-group">
                        <label for="group-gaps">Time Gaps (mins, comma sep)</label>
                        <input type="text" id="group-gaps" value="30, 45" placeholder="e.g. 30, 45">
                    </div>
                </div>
            </section>

            <section class="results-area">
                <h3>Found Slots</h3>
                <div id="results-list" class="results-list">
                    <div class="empty-state">No slots found yet.</div>
                </div>
            </section>
        </main>

        <footer>
            <button id="test-notify" class="secondary-btn" style="margin-bottom: 8px;">Test Notification</button>
            <button id="toggle-monitor" class="primary-btn">Start Monitoring</button>
            <div class="footer-note">Polls every 10 minutes in background.</div>
        </footer>
    </div>
    <script type="module" src="popup.js"></script>
</body>
</html>
